name: Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore

    - name: Build
      run: msbuild -p:Configuration=Release -p:SignManifests=false

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: exe-output
        path: '**/*.exe'
